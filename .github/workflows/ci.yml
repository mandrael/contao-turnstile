name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: PHP-Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Syntax-Check (beweist PHP-8.1-Kompatibilitaet)
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
          php -l contao/templates/form_turnstile.html5

  tests:
    name: Tests & statische Analyse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          # contao/test-case 5.7 zieht PHPUnit 12 (benoetigt PHP 8.3+).
          php-version: '8.3'
          coverage: none
      - name: composer validate
        run: composer validate --no-check-publish --strict
      - name: Abhaengigkeiten installieren
        run: composer update --no-plugins --no-interaction --no-progress --prefer-dist
      - name: PHPUnit
        run: vendor/bin/phpunit
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress
